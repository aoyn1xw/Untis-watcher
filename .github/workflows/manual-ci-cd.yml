name: Manual CI/CD

on:
  workflow_dispatch:
    inputs:
      run_live_untis_check:
        description: "Run live WebUntis smoke check using GitHub Secrets"
        required: false
        default: false
        type: boolean
      build_windows_exe:
        description: "Build Windows executable artifact"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  ci_static:
    name: CI 1/3 - Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate syntax
        run: |
          python -m py_compile \
            ai.py \
            config.py \
            detector.py \
            main.py \
            notifier.py \
            storage.py \
            timetable.py \
            build_exe.py

      - name: Validate imports (no runtime)
        run: |
          python - <<'PY'
          import detector
          import storage
          print('Import checks passed.')
          PY

  ci_logic:
    name: CI 2/3 - Logic Smoke Tests
    runs-on: ubuntu-latest
    needs: ci_static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run detector + storage smoke tests
        run: |
          python - <<'PY'
          import os
          import detector
          import storage

          old = [
              {
                  "id": 1,
                  "start": "2026-04-23T08:00",
                  "end": "2026-04-23T08:45",
                  "subjects": ["Math"],
                  "teachers": ["M"],
                  "rooms": ["101"],
                  "code": None,
                  "change_type": "normal",
              }
          ]
          new = [
              {
                  "id": 1,
                  "start": "2026-04-23T08:00",
                  "end": "2026-04-23T08:45",
                  "subjects": ["Math"],
                  "teachers": ["M"],
                  "rooms": ["101"],
                  "code": "irregular",
                  "change_type": "changed",
              }
          ]

          # Hash and diff behavior
          assert detector.hash_tt(old) != detector.hash_tt(new)
          changes = detector.find_changes(old, new)
          assert len(changes) == 1
          assert changes[0]["type"] == "changed"

          # Storage roundtrip
          storage.save(new)
          loaded = storage.load()
          assert loaded == new
          if os.path.exists("last_timetable.json"):
              os.remove("last_timetable.json")

          print("Logic smoke tests passed.")
          PY

  ci_live_untis:
    name: CI 3/3 - Live WebUntis Smoke Check
    runs-on: ubuntu-latest
    needs: ci_logic
    if: ${{ inputs.run_live_untis_check }}
    env:
      UNTIS_SERVER: ${{ secrets.UNTIS_SERVER }}
      UNTIS_SCHOOL: ${{ secrets.UNTIS_SCHOOL }}
      UNTIS_USER: ${{ secrets.UNTIS_USER }}
      UNTIS_PASSWORD: ${{ secrets.UNTIS_PASSWORD }}
      UNTIS_ELEMENT_TYPE: ${{ secrets.UNTIS_ELEMENT_TYPE }}
      UNTIS_ELEMENT_ID: ${{ secrets.UNTIS_ELEMENT_ID }}
      UNTIS_TENANT_ID: ${{ secrets.UNTIS_TENANT_ID }}
      UNTIS_CLIENT_ID: ${{ secrets.UNTIS_CLIENT_ID }}
      UNTIS_API_PASSWORD: ${{ secrets.UNTIS_API_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets for smoke check
        run: |
          python - <<'PY'
          import os

          required = [
              "UNTIS_SERVER",
              "UNTIS_SCHOOL",
              "UNTIS_USER",
              "UNTIS_PASSWORD",
              "UNTIS_ELEMENT_ID",
          ]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              raise SystemExit(f"Missing required GitHub Secrets for live check: {', '.join(missing)}")

          print("Required live-check secrets are present.")
          PY

      - name: Live fetch smoke test
        run: |
          python - <<'PY'
          import timetable

          session = timetable.get_session()
          try:
              lessons = timetable.fetch(session)
              assert isinstance(lessons, list)
              if lessons:
                  first = lessons[0]
                  required_keys = {
                      "id",
                      "start",
                      "end",
                      "subjects",
                      "teachers",
                      "rooms",
                      "code",
                      "change_type",
                  }
                  assert required_keys.issubset(first.keys())
              print(f"Live WebUntis smoke test passed. Lessons fetched: {len(lessons)}")
          finally:
              timetable.logout(session)
          PY

  cd:
    name: Build Windows Artifact
    runs-on: windows-latest
    needs:
      - ci_logic
      - ci_live_untis
    if: ${{ !cancelled() && inputs.build_windows_exe && (needs.ci_live_untis.result == 'success' || needs.ci_live_untis.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: python build_exe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UntisWatcher-windows-exe
          path: dist/UntisWatcher.exe
          if-no-files-found: error
